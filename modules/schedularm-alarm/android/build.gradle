apply plugin: 'expo-module-gradle-plugin'

group = 'expo.modules.schedularmalarm'
version = '0.1.0'

android {
  namespace 'expo.modules.schedularmalarm'
  defaultConfig {
    minSdkVersion 24
  }
}

dependencies {
  // Explicit pin for NotificationCompat / NotificationManagerCompat /
  // ActivityCompat / ContextCompat. expo-modules-core already exposes this
  // exact version via `api` (1.17.0) — matched here to guarantee it's on our
  // compile classpath with zero version conflict.
  implementation 'androidx.core:core-ktx:1.17.0'
}
